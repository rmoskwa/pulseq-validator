# Workspace root for the pulseq-validator.
#
#   crates/pulseq-parse       — our .seq parser, forked from pulseq-rs (MIT; see
#                               crates/pulseq-parse/NOTICE), now owned & developed here
#   crates/seq-validate-core  — engine library; Step 1 exposes the IR over pulseq-parse
#
# The `seq-validate` binary crate is added in Step 2 (docs/02-crate-skeleton.md).
[workspace]
resolver = "3"
members = [
    "crates/pulseq-parse",
    "crates/seq-validate-core",
]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
