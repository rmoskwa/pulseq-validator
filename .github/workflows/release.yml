# Release build: on a version tag (e.g. v0.1.0) this cross-compiles the
# seq-validate CLI for each supported target and attaches a self-contained
# archive to the GitHub Release for that tag.
#
# The binary embeds its scanner profiles and JSON schemas at build time
# (crates/seq-validate-core/build.rs), so each archive is a single drop-in
# executable with no runtime asset dependencies — the repo need not be present.
# Linux targets are musl, i.e. fully static with no glibc-version coupling, so
# the binary runs unchanged in arbitrary containers / agent harnesses.
#
# CI (.github/workflows/ci.yml) already gates main on fmt/clippy/test; this
# workflow only builds and uploads.
name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create the Release once, up front. If each matrix job created it on demand
  # instead, the parallel jobs would race to create the same release and all but
  # one would fail with "release already exists". With the release pre-created,
  # the upload jobs only attach assets (distinct filenames → no collision).
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Builds `seq-validate` for the target (using cross for the musl targets),
      # packages it as $bin-$target.tar.gz (.zip on Windows) with a sha256
      # sidecar, and attaches it to the release created above. Built with the
      # `dist` profile (release + `strip = "symbols"`, see Cargo.toml) so the
      # shipped binary carries no debug symbols.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: seq-validate
          target: ${{ matrix.target }}
          profile: dist
          include: README.md,LICENSE
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
